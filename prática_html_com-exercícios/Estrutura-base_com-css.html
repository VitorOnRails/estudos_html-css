<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Vitor">
    <title>Estrutura Base com CSS</title>
    <style>
        body {
            background-color: #414134;
        }

        h1 {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 40px;
            font-style: italic;
            font-variant: small-caps;
            text-align: end;
            text-decoration: line-through;
            color: red;
            background-color: blue;
            border: 5px solid red;
            border-radius: 5px;
            padding: 20px;
            
       }

       h2 {
            font-family: cursive;
            font-size: 32px;
            text-align: center;
            text-decoration: overline;
            color: blue;
            background-color: red;
       }

       p {
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            font-size: 24px;
            text-align: left;
            text-decoration: underline;
            color: green;
            background-color: #FF00FF;
       }

       .amarelo {
            color: yellow;
            background-color: azure;
       }

       #destaque {
            color: red;
            background-color: yellow;
       }
    </style>
</head>
<body>
    <h1>Título vermelho</h1>
    <h2>Subtítulo azul</h2>
    <p>Parágrafo verde</p>
    <p class="amarelo">Parágrafo amarelo</p>
    <p class="amarelo">Parágrafo também amarelo</p>
    <p id="destaque">Parágrafo destaque</p>
</body>
</html>
