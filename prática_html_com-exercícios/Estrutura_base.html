<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <title>Praticando estrutura base do html</title>
        <meta charset="UTF-8">
        <meta name="author" content="Vitor">
        <!-- meta tag que informa quem é o autor da página -->
        <meta name="description" content="Prática da estrutura base do HTML">
        <!-- meta tag que oferece uma breve descrição da página.
             Muito importante porque essa descrição pode ser usada por mecanismos de busca para exibir um resumo da página nos resultados de pesquisa. 
        -->
        <meta name="keywords" content="HTML, estrutura base, prática">
        <!-- meta tag que fornece palavras-chave relacionadas ao conteúdo da página.
             Antigamente, era usada por mecanismos de busca para indexar e classificar páginas, mas atualmente é menos relevante devido ao abuso de palavras-chave.
        -->
    </head>
        <body>
            <h1>Estrutura Base do HTML</h1>
        </body>
</html>
