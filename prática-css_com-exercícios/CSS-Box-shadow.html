<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Vitor">
    <meta name="description" content="Praticando Box-shadow">
    <title>Praticando CSS - Box-shadow</title>
    
    <style>
        #border-radius {
            background-color: orange;
            width: 200px;
            height: 200px;
            margin: 50px auto;
            border-radius: 50px 50% / 50% 50px;
            box-shadow: -10px 10px 5px 3px black, 10px -10px 5px 3px gray;
        }
    </style>
</head>
    <body>
        <h1>CSS Box-shadow</h1>

        <div id="border-radius"></div>
    </body>
</html>
