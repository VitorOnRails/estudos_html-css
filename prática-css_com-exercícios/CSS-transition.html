<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="author" content="Vitor">
        <meta name="description" content="Praticando um pouco a propriedade transition do CSS.">
        <title>Praticando CSS - Transition</title>

        <style>

            div {
                width: 100px;
                height: 100px;
                background-color: orange;

                transition-property: width, height;
                transition-duration: 1s, 2s;
                transition-timing-function: cubic-bezier(0.175, 0.885, 0.32, 1.275);
                transition-delay: 0.2s, 0s;
            }

            div:hover {
                width: 200px;
                height: 200px;
            }
        </style>
    </head>
    <body>
        <h1>CSS - Transition</h1>

        <div>Div</div>
    </body>
</html>
