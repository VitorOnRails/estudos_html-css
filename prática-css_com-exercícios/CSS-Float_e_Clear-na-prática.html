<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Vitor">
    <meta name="description" content="Praticando Float e Clear">
    <title>Praticando Float e Clear</title>

    <style>
        #container {
            width: 80%;
            padding: 15px;
            background-color: #c0c0c0;
            overflow: auto;
        }

        #container div {
            border: 3px solid red;
            width: 150px;
            height: 50px;
            margin: 5px;       
        }

        #div1 {
            float: left;
            background-color: #00ff00;
        }

        #div2 {
            float: left;
            background-color: #00ff00;
        }

        #div3 {
            float: left;
            background-color: #00ff00;
        }

        header {
            background-color: #c0c0c0;
            height: 50px;
        }

        nav {
            background-color: orange;
            width: 25%;
            height: 50px;
            float: left;
        }

        main {
            background-color: yellow;
            width: 70%;
            height: 100px;
            float: right;
        }

        footer {
            height: 50px;
            background-color: blue;
            clear: both;
        }
    </style>
</head>
<body>
    <h1>Float</h1>
    <div id="container">
        <div id="div1">Div 1</div>
        <div id="div2">Div 2</div>
        <div id="div3">Div 3</div>
    </div>

    <hr>

    <header>header</header>
    <nav>nav</nav>
    <main>main</main>
    <footer>footer</footer>
</body>
</html>
