<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Vitor">
    <meta name="description" content="Praticando Linear-gradient">
    <title>Praticando CSS - Linear-gradient</title>
    
    <style>

        html, body {
            height: 100%;
        }

        body {
            background-image: linear-gradient(to right top, red, transparent), linear-gradient(to left bottom, #292525, transparent);
        }

        #border-radius {
            background-color: orange;
            width: 200px;
            height: 200px;
            margin: 50px auto;
            border-radius: 50px 50% / 50% 50px;
            box-shadow: -10px 10px 5px 3px black, 10px -10px 5px 3px gray;
        }

        h1 {
            font-family: sans-serif;
            font-size: 40px;
            text-align: center;
            text-shadow: -1px 1px 0 gray, -2px 2px 0 #727272, -3px 3px 0 #c5bfbf, -4px 4px 0 #b9b5b5, -5px 5px 0 #c5a2a2;
        }
    </style>
</head>
    <body>
        <h1>CSS Linear-gradient</h1>

        <div id="border-radius"></div>
    </body>
</html>
