<!DOCTYPE html>
<!-- A declaração <!DOCTYPE html> é usada para informar ao navegador que o documento é um arquivo HTML5. 
    Ela deve ser a primeira linha do documento e é importante para garantir que o navegador interprete o código corretamente. 
 -->
<html lang="pt-br">
    <!-- A tag <html> é a raiz de um documento HTML e envolve todo o conteúdo da página. 
         O atributo lang="pt-br" indica que o idioma principal do conteúdo é o português do Brasil.
    -->
    <head>
        <!-- Conteúdo com informações adicionais sobre o site para o navegador que não
            são exibidas diretamente para o usuário, mas são importantes para o funcionamento do site. 
        -->
    </head>
        <body>
            <!-- Conteúdo visível para o usuário, como texto, imagens, vídeos, etc. -->
        </body>
</html>
