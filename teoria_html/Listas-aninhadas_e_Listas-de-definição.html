<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Vitor">
    <meta name="description" content="Teoria sobre listas aninhadas e listas de definição">
    <title>Teoria - Listas aninhadas e Listas de definição</title>
</head>
    <body>
        <!-- Um exemplo de lista aninhada: -->
         <ul>
            <li></li>
            <li>
          <ul>
            <li></li>
            <li></li>
          </ul>
            </li>
            <li></li>
         </ul>
        <!-- Lista aninhada: quando inserimos uma ou mais listas dentro de outra lista, inserindo a nova tag dentro de um item da lista principal (<li>), exatamente o que acontece no código acima. -->
        

        <!-- Um exemplo de listas de definição: -->
         <dl>
            <dt></dt>
            <dd></dd>
            <dt></dt>
            <dd></dd>
         </dl>

         <!-- Explicação sobre cada tag: --><!-- dl: definition list. È uma tag que serve para listar termos e definições. Diferente da ul ou ol, ela é utilizada para apresentar um termo e explicar sobre ele, como um dicionário. -->
          <dl></dl>
        <!-- dl: definition list. É uma tag que serve para listar termos e definições. Diferente da ul ou ol, ela é utilizada para apresentar um termo e explicar sobre ele, como um dicionário. -->
         <dt></dt>
        <!-- dt: definition term. É a tag que define o termo. Ela vai dentro da tag <dl> e sem ela a tag <dl> perde significado semântico.  -->
        <dd></dd>
        <!-- dd: definition details. É a tag que define o significado/definição do termo. Ela também vai dentro da tag <dl> e sem ela a tag <dl> perde o significado semântico. -->

        <!-- OBS: Uma tag <dl> pode ter várias tags <dt> ou <dd> dentro dela, o importante é as duas tags trabalharem juntas dentro da <dl>.  -->
    </body>
</html>
